<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Trip Planner</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #FF9A8B, #FF6A88, #FF99AC);
      margin: 0;
      padding: 20px;
      color: #333;
      text-align: center;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      border-radius: 10px;
      padding: 50px;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
    }
    h1 {
      color: #FF6A88;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }
    input {
      background: #f0f0f0;
    }
    button {
      background: #FF6A88;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }
    button:hover {
      background: #FF3F6D;
    }
    .chat-box {
      height: 450px;
      overflow-y: auto;
      background: #f9f9f9;
      border-radius: 5px;
      padding: 15px;
      text-align: left;
      margin-top: 20px;
    }
    .user-message {
      background: #FF6A88;
      color: #fff;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: inline-block;
      max-width: 90%;
    }
    .bot-message {
      background: #d4edda;
      color: #155724;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: inline-block;
      max-width: 90%;
    }
    .loading {
      display: none;
      font-size: 14px;
      color: #FF6A88;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Trip Planner</h1>
    <input type="text" id="destination" placeholder="Enter Destination" />
    <input type="number" id="days" placeholder="Number of Days" />
    <input type="text" id="interests" placeholder="Your Interests (e.g., adventure, history, food, nature, nightlife)" />
    <input type="text" id="budget" placeholder="Enter your budget (optional)" />
    <button onclick="generateItinerary()">Plan Trip</button>
    <p class="loading" id="loading">Planning your trip... Please wait.</p>
    <div class="chat-box" id="chat-box"></div>
  </div>

  <script>
    const API_KEY = "AIzaSyA9BuwyFpDlCcZL5gL6hlt5Zlc6cFytmKQ";

    async function generateItinerary() {
      const destination = document.getElementById("destination").value;
      const days = document.getElementById("days").value;
      const interests = document.getElementById("interests").value;
      const budget = document.getElementById("budget").value;
      const chatBox = document.getElementById("chat-box");
      const loading = document.getElementById("loading");

      if (!destination || !days || !interests) {
        alert("Please fill all fields (budget is optional).");
        return;
      }

      // Display user's message
      chatBox.innerHTML += `<p class="user-message"><strong>You:</strong> I want to plan a trip to ${destination} for ${days} days with interests in ${interests}${budget ? " and a budget of " + budget : ""}.</p>`;
      chatBox.scrollTop = chatBox.scrollHeight;

      // Show loading indicator
      loading.style.display = "block";

      // Your exact prompt (unchanged) with an extra line for budget if provided
      const prompt = `I want to plan a trip to ${destination} for ${days} days. Please find the best places to visit based on Google reviews and ratings. Also, tailor the trip itinerary based on my interests, which include ${interests}.

Organize the trip day by day, including:

The best-reviewed attractions, restaurants, and activities.
An optimized travel route to minimize travel time.
Suggested accommodations based on ratings and proximity to attractions.
Estimated costs and best times to visit each place.
Any important local tips, such as entry fees, opening hours, or cultural etiquette.
A well-balanced schedule with travel time, exploration, relaxation, and local experiences.
Ensure the plan maximizes my time and provides an enjoyable experience.
${budget ? "My budget is " + budget + "." : ""}`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }]
          })
        });

        const data = await response.json();
        loading.style.display = "none";

        if (data && data.candidates && data.candidates.length > 0) {
          const reply = data.candidates[0].content.parts[0].text;
          const formattedReply = formatResponse(reply);
          chatBox.innerHTML += `<p class="bot-message"><strong>Bot:</strong><br>${formattedReply}</p>`;
        } else {
          chatBox.innerHTML += `<p class="bot-message"><strong>Bot:</strong> Unable to generate an itinerary. Try again.</p>`;
        }
      } catch (error) {
        console.error("Error:", error);
        loading.style.display = "none";
        chatBox.innerHTML += `<p class="bot-message"><strong>Bot:</strong> There was an error processing your request.</p>`;
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Format bot response for better readability
    function formatResponse(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>") // Bold
        .replace(/\*(.*?)\*/g, "<em>$1</em>") // Italic
        .replace(/- (.*?)/g, "• $1") // Bullets
        .replace(/\n/g, "<br>"); // New lines
    }
  </script>
</body>
</html>
